name: Release

# Publish @kryard/sdk (packages/typescript) to npm on a version tag (e.g. v0.2.0).
# The tag must match the package's version. Requires repo secret NPM_TOKEN (an npm
# automation token with publish rights to the @kryard scope).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # npm workspaces (not pnpm). No package-lock.json is committed on purpose: a
      # single-platform lockfile omits other platforms' optional native deps
      # (@rollup/rollup-linux-x64-gnu / @esbuild/linux-x64, npm#4828), so a pinned
      # install can't fetch them on the Linux runner and vitest fails to start.
      # `npm install` resolves the tree fresh per-platform and pulls the right binaries.
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      # Publish only the TypeScript workspace package.
      - run: npm publish -w @kryard/sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
