name: Publish to GitHub Packages

# Publishes @kryard/sdk (packages/typescript) to GitHub Packages
# (npm.pkg.github.com), scoped to the repo owner. Uses the built-in GITHUB_TOKEN.
# Fires on a version tag, or run manually (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@kryard"
      # No committed lockfile (npm#4828: a single-platform lock omits the Linux
      # rollup/esbuild binaries). `npm install` resolves fresh so vitest's native
      # deps are present in CI.
      - run: npm install
      # publish runs the package's prepack (build) + prepublishOnly (typecheck+test).
      - run: npm publish -w @kryard/sdk --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
